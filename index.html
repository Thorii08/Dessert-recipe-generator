<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width= device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>AI Dessert Recipe Generator</title>
  </head>
  <body>
    <header>
      <h1>AI Dessert Recipe Generator</h1>
    </header>

    <main>
      <form>
        <input
          type="text"
          placeholder="Enter the recipe name"
          autofocus
          required
          autocomplete="off"
        />
        <input type="submit" />
      </form>
      <div>
        2 large onions, peeled
        <br />
        2 large carrots, peeled
      </div>
    </main>

    <footer>
      This AI project was coded by
      <a href="https://github.com/Thorii08" target="_blank">Thoriso Zozi</a> and
      is
      <a
        href="https://github.com/Thorii08/Dessert-recipe-generator"
        target="_blank"
      >
        open-sourced on Github</a
      >
      and is
      <a href="https://dessert-recipe-generator.onrender.com" target="_blank"
        >hosted on Render</a
      >.
    </footer>

    <script src="index.js"></script>
  </body>
</html>
