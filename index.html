<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width= device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <title>AI Dessert Recipe Generator</title>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>AI Dessert Recipe Generator</h1>
      </header>

      <main>
        <form id="recipe-generator-form">
          <input
            type="text"
            placeholder="Enter the recipe name"
            autofocus
            required
            autocomplete="off"
            class="instructions"
          />
          <input type="submit" class="submit-button" />
        </form>
        <div class="recipe" id="recipe"></div>
      </main>

      <footer>
        This AI project was coded by
        <a href="https://github.com/Thorii08" target="_blank">Thoriso Zozi</a>
        and is
        <a
          href="https://github.com/Thorii08/Dessert-recipe-generator"
          target="_blank"
        >
          open-sourced on Github</a
        >
        and is
        <a href="https://dessert-recipe-generator.onrender.com" target="_blank"
          >hosted on Render</a
        >.
      </footer>
    </div>

    <script src="index.js"></script>
  </body>
</html>
